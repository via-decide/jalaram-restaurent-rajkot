<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>| food.decide |</title>

  <!-- Gujarati Font: Anek Gujarati -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Gujarati:wght@100..800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0a;
      --card:#111;
      --border:#2a2a2a;
      --muted:#8a8a8a;
      --text:#f0f0f0;
      --orange:#ff671f;
      --go:#00e676;
      --bad:#ff3333;

      --mono:'Courier New', monospace;
      /* Gujarati UI font first, then system fallback */
      --ui:'Anek Gujarati', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html,body{
      margin:0; padding:0; height:100%; width:100%;
      background:var(--bg);
      color:var(--text);
      font-family:var(--ui);
      overflow:hidden;
      touch-action:none;
      -webkit-user-select:none;
      user-select:none;
      font-optical-sizing:auto;
      font-variation-settings:"wdth" 100;
    }

    #master-container{height:100vh;width:100vw;position:relative;overflow:hidden;}

    .main-slide{
      height:100vh;width:100vw;
      position:absolute;top:0;left:0;
      display:flex;flex-direction:column;
      background:var(--bg);
      transition: transform .5s cubic-bezier(.2,.8,.2,1);
      will-change:transform;
    }
    .main-slide.prev{transform:translateY(-100%);}
    .main-slide.active{transform:translateY(0);z-index:10;}
    .main-slide.next{transform:translateY(100%);z-index:20;}

    .slide-header{
      padding:18px 18px 14px 18px;
      border-left:3px solid var(--orange);
      height:74px;
      flex-shrink:0;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    .header-left{display:flex;flex-direction:column;gap:6px;}
    .header-title{
      font-family:var(--mono);
      font-size:.78rem;
      color:var(--orange);
      letter-spacing:1px;
      font-weight:800;
      text-transform:uppercase;
      line-height:1;
    }
    .header-sub{
      font-family:var(--mono);
      font-size:.68rem;
      color:#6f6f6f;
      letter-spacing:.5px;
      text-transform:uppercase;
      line-height:1;
    }

    .pill-status{
      font-family:var(--mono);
      font-size:.68rem;
      font-weight:900;
      text-transform:uppercase;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#0f0f0f;
      color:#dcdcdc;
      white-space:nowrap;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .dot{width:8px;height:8px;border-radius:50%;}
    .dot.open{background:var(--go); box-shadow:0 0 14px rgba(0,230,118,.35);}
    .dot.closed{background:var(--bad); box-shadow:0 0 14px rgba(255,51,51,.25);}

    .carousel-viewport{position:relative;flex-grow:1;width:100%;height:100%;}

    .sub-slide{
      position:absolute; inset:0;
      padding:22px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transform:translateX(18px);
      transition:transform .3s ease, opacity .3s ease;
    }
    .sub-slide.opt-active{z-index:30;opacity:1;pointer-events:auto;transform:translateX(0);}
    .sub-slide.opt-hidden{z-index:0;opacity:0;pointer-events:none;}
    .sub-slide.static{z-index:30;opacity:1;pointer-events:auto;transform:none;}

    h1{
      font-size:1.95rem;
      margin:0 0 12px 0;
      line-height:1.05;
      letter-spacing:-.5px;
      color:var(--orange);
      font-weight:850;
    }
    .primary-question{
      font-size:1.08rem;
      color:#fff;
      margin-bottom:22px;
      line-height:1.4;
      font-weight:750;
    }
    .price{
      font-size:.88rem;
      color:#b8b8b8;
      margin-left:10px;
      font-family:var(--mono);
      background:#1f1f1f;
      padding:2px 7px;
      border-radius:7px;
      border:1px solid #2f2f2f;
    }

    .role-label{
      font-family:var(--mono);
      font-size:.64rem;
      color:#000;
      background:var(--go);
      padding:5px 9px;
      border-radius:8px;
      width:fit-content;
      margin-bottom:14px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.6px;
    }

    .nav-hint{
      margin-top:26px;
      padding-top:16px;
      border-top:1px solid #2b2b2b;
      font-family:var(--mono);
      font-size:.72rem;
      color:#777;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    /* Lobby */
    .lobby-container{
      display:flex;
      flex-direction:column;
      gap:14px;
      padding:18px 18px 24px;
      height:100%;
      justify-content:center;
    }

    .banner{
      border:1px solid rgba(255,103,31,.5);
      background:rgba(255,103,31,.08);
      padding:12px 14px;
      border-radius:14px;
      font-family:var(--mono);
      font-weight:900;
      text-transform:uppercase;
      font-size:.74rem;
      letter-spacing:.5px;
      color:#ffb38a;
    }
    .banner.closed{
      border-color: rgba(255,51,51,.6);
      background: rgba(255,51,51,.10);
      color:#ff9a9a;
    }
    .banner.open{
      border-color: rgba(0,230,118,.55);
      background: rgba(0,230,118,.08);
      color:#9affcf;
    }

    .grid{ display:grid; gap:12px; margin-top:2px; }

    .cat-btn{
      background:linear-gradient(145deg,#141414,#0a0a0a);
      border:1px solid #2b2b2b;
      color:#d8d8d8;
      padding:16px 16px;
      border-radius:16px;
      transition:transform .06s, border-color .2s, box-shadow .2s, background .2s;
      text-align:left;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .cat-btn:active{transform:translateY(1px);}
    .cat-btn .name{
      font-weight:900;
      font-size:1.05rem;
      text-transform:uppercase;
      letter-spacing:.2px;
    }
    .cat-btn .meta{
      font-family:var(--mono);
      font-weight:900;
      font-size:.7rem;
      color:#8b8b8b;
      text-transform:uppercase;
    }
    .cat-btn.selected{
      border-color: rgba(255,103,31,.9);
      box-shadow: 0 0 18px rgba(255,103,31,.18);
      background:linear-gradient(145deg, rgba(255,103,31,.22), rgba(0,0,0,.4));
    }
    .cat-btn.selected .meta{color:#ffd2ba;}

    .btn{
      background:#1b1b1b;
      color:#fff;
      border:1px solid #2c2c2c;
      padding:14px;
      border-radius:14px;
      font-weight:900;
      text-align:center;
      font-size:1rem;
      cursor:pointer;
      width:100%;
      box-sizing:border-box;
      transition:transform .06s, opacity .2s;
      letter-spacing:.2px;
    }
    .btn:active{transform:translateY(1px);}
    .btn.primary{
      background:#fff;
      color:#000;
      border:none;
    }
    .btn.whatsapp{
      background:#25D366;
      color:#000;
      border:none;
    }

    #depth-fill{
      position:fixed;right:0;top:0;bottom:0;
      width:4px;background:#333;z-index:900;
      height:0%;transition:height .05s linear;
    }

    .toast-msg{
      position:fixed;
      bottom:92px;left:50%;
      transform:translateX(-50%);
      background:#161616;
      color:var(--go);
      padding:10px 16px;
      border:1px solid rgba(0,230,118,.8);
      border-radius:999px;
      font-size:.85rem;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s;
      z-index:3000;
      white-space:nowrap;
      font-family:var(--mono);
      box-shadow:0 8px 30px rgba(0,0,0,.45);
    }
    .toast-msg.visible{opacity:1;}

    #mic-toggle{
      position:fixed;
      bottom:18px;left:18px;
      width:54px;height:54px;
      background:#0f0f0f;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid #2d2d2d;
      z-index:2000;
      cursor:pointer;
      transition:all .25s;
      box-shadow:0 10px 24px rgba(0,0,0,.5);
    }
    #mic-toggle svg{width:24px;height:24px;fill:#7b7b7b;}
    #mic-toggle.listening{
      border-color: rgba(0,230,118,.9);
      box-shadow:0 0 18px rgba(0,230,118,.25), 0 10px 24px rgba(0,0,0,.5);
    }
    #mic-toggle.listening svg{fill:var(--go);}

    /* Preferences */
    .card{
      border:1px solid #2b2b2b;
      background:linear-gradient(145deg,#111,#0c0c0c);
      padding:16px;
      border-radius:16px;
      margin-top:14px;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
    }

    .label{
      font-family:var(--mono);
      font-size:.72rem;
      color:#8a8a8a;
      text-transform:uppercase;
      font-weight:900;
      letter-spacing:.7px;
    }

    .pill-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
    .pill{
      border:1px solid #2b2b2b;
      background:#101010;
      color:#ddd;
      padding:10px 12px;
      border-radius:999px;
      font-family:var(--mono);
      font-weight:950;
      font-size:.74rem;
      cursor:pointer;
    }
    .pill.active{
      border-color: rgba(0,230,118,.9);
      background: rgba(0,230,118,.95);
      color:#000;
      box-shadow:0 0 12px rgba(0,230,118,.18);
    }

    .field{display:grid;gap:6px;margin-top:12px;}
    .input, textarea{
      border:1px solid #2b2b2b;
      background:#0e0e0e;
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:1rem;
      outline:none;
      width:100%;
      box-sizing:border-box;
      font-family:var(--ui);
    }
    textarea{min-height:90px;resize:none;}

    /* Item icon block */
    .item-icon-wrap{
      width:64px;
      height:64px;
      border-radius:16px;
      border:1px solid #2b2b2b;
      background: radial-gradient(120% 120% at 30% 20%, rgba(255,103,31,.18), rgba(0,0,0,.35));
      box-shadow:0 10px 28px rgba(0,0,0,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
    }
    .item-icon-wrap svg{
      width:40px;
      height:40px;
      stroke: rgba(255,255,255,.92);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .95;
    }

    /* Final */
    .verdict-container{display:flex;flex-direction:column;height:100%;justify-content:center;padding:0 4px;}
    .choice-header{
      font-family:var(--mono);
      color:#6d6d6d;
      font-size:.8rem;
      margin-bottom:14px;
      text-transform:uppercase;
      text-align:center;
      letter-spacing:1px;
      font-weight:950;
    }
    .input-group{
      border:1px solid #2b2b2b;
      background:linear-gradient(145deg,#101010,#0a0a0a);
      padding:14px;
      border-radius:16px;
      margin-bottom:14px;
      min-height:120px;
      max-height:42vh;
      overflow-y:auto;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
    }

    .item-row{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      padding:12px 0;
      border-bottom:1px dashed #2b2b2b;
      align-items:center;
    }

    .item-name{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .item-name .t{
      font-family:var(--ui);
      font-weight:800;
      font-size:.98rem;
      color:#e6e6e6;
    }
    .item-name .s{
      font-family:var(--mono);
      font-weight:900;
      font-size:.72rem;
      color:#8c8c8c;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
    }

    .qty-btn{
      width:34px;height:34px;
      border-radius:12px;
      border:1px solid #2b2b2b;
      background:#0e0e0e;
      color:#fff;
      font-weight:950;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--mono);
      box-shadow:0 8px 20px rgba(0,0,0,.35);
    }
    .qty-btn:active{transform:translateY(1px);}
    .qty-num{
      font-family:var(--mono);
      font-weight:950;
      font-size:.84rem;
      color:var(--go);
      min-width:34px;
      text-align:center;
    }

    .total-row{
      display:flex;
      justify-content:space-between;
      padding-top:12px;
      margin-top:12px;
      border-top:1px solid #2b2b2b;
      font-family:var(--mono);
      font-weight:950;
      text-transform:uppercase;
      letter-spacing:.6px;
    }
    .total-row .k{color:#9a9a9a;}
    .total-row .v{color:#fff;}

    .hint{
      text-align:center;
      color:#666;
      font-family:var(--mono);
      font-size:.74rem;
      margin-top:2px;
    }
  </style>
</head>

<body>
  <div id="master-container"></div>
  <div id="depth-fill"></div>
  <div id="toast" class="toast-msg"></div>

  <div id="mic-toggle" onclick="toggleListenMode()">
    <svg viewBox="0 0 24 24">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
      <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
    </svg>
  </div>

  <script>
    /* ===============================
       GUJARATI UI STRINGS
       =============================== */
    const UI_GU = {
      lobbyTitle: "આજ શું મંગાવીએ?",
      hunt: "શરૂ કરો →",

      openNow: "ખુલ્લું છે • 6PM–10PM",

      bestTime: "સારો સમય: 6PM–10PM • 6PM પહેલા અને 10PM પછી બંધ",
      selected: "પસંદ",
      tap: "ટૅપ",
      items: "આઇટમ્સ",
      noItems: "આઇટમ નથી",
      emptyCat: "આ કેટેગરી ખાલી છે.",
      swipeDownContinue: "નીચે સ્વાઇપ કરીને આગળ વધો ↓",
      swipeDownToAdd: "ઉમેરવા માટે નીચે સ્વાઇપ કરો",
      skip: "← સ્કિપ",
      browse: "બ્રાઉઝ →",
      prefsTitle: "પસંદગીઓ",
      timingLabel: "સમયની પસંદગી",
      dineTakeLabel: "ડાઇન-ઇન કે ટેક-અવે",
      dineIn: "ડાઇન-ઇન",
      takeAway: "ટેક-અવે",
      nameLabel: "નામ",
      namePh: "તમારું નામ (વૈકલ્પિક)",
      phoneLabel: "ફોન",
      phonePh: "ફોન નંબર (વૈકલ્પિક)",
      notesLabel: "ખાસ નોંધ",
      notesPh: "ઓછું તીખું, જૈન, એક્સ્ટ્રા પાવ, વગેરે.",
      swipeDownCheckout: "નીચે સ્વાઇપ કરીને ચેકઆઉટ ↓",
      checkout: "ચેકઆઉટ",
      whatsappOrder: "વોટ્સએપ ઓર્ડર",
      copyOrder: "ઓર્ડર કોપી કરો",
      startNew: "નવું શરૂ કરો",
      cartEmpty: "કાર્ટ ખાલી",
      copied: "કોપી થયું ✅",
      copyFailed: "કોપી ન થયું",
      micOn: "માઇક ચાલુ",
      micOff: "માઇક બંધ",
      voiceNA: "વોઈસ સપોર્ટ નથી",
      voiceTmp: "વોઈસ થોડું અસ્થિર",
      added: "ઉમેર્યું",
      removed: "કાઢ્યું",
      total: "કુલ",
      each: "દર",
      line: "લાઇન",
      statusOpen: "ખુલ્લું",
      statusClosed: "બંધ"
    };

    /* ===============================
       JALARAM (RAJKOT) LOCAL MENU
       =============================== */
    const JALARAM_MENU = {
      meta: { version:"menu.v1", currency:"INR", outlet:"Jalaram Food Court", location:"Rajkot, Gujarat" },
      cuisines: {
        jalaram: {
          label: "JALARAM",
          categories: {
            jb_pavbhaji: { label:"પાવ ભાજી", items:[
              { id:"classic_pav_bhaji", name:"ક્લાસિક પાવ ભાજી", price:120 },
              { id:"butter_pav_bhaji", name:"બટર પાવ ભાજી", price:130 },
              { id:"masala_pav_bhaji", name:"મસાલા પાવ ભાજી", price:135 },
              { id:"cheese_pav_bhaji", name:"ચીઝ પાવ ભાજી", price:140 },
              { id:"paneer_pav_bhaji", name:"પનીર પાવ ભાજી", price:150 },
              { id:"jain_pav_bhaji", name:"જૈન પાવ ભાજી", price:120 }
            ]},
            jb_pulav: { label:"પુલાવ", items:[
              { id:"veg_pulav", name:"વેજ પુલાવ", price:130 },
              { id:"butter_veg_pulav", name:"બટર વેજ પુલાવ", price:140 },
              { id:"tava_pulav", name:"તવા પુલાવ", price:145 },
              { id:"paneer_pulav", name:"પનીર પુલાવ", price:160 },
              { id:"cheese_pulav", name:"ચીઝ પુલાવ", price:160 },
              { id:"jain_veg_pulav", name:"જૈન વેજ પુલાવ", price:130 }
            ]},
            jb_combos: { label:"કોમ્બો", items:[
              { id:"combo_pavbhaji_pulav", name:"પાવ ભાજી + પુલાવ", price:240 },
              { id:"combo_cheese_pavbhaji_paneer_pulav", name:"ચીઝ પાવ ભાજી + પનીર પુલાવ", price:290 },
              { id:"combo_jain", name:"જૈન કોમ્બો", price:230 }
            ]},
            jb_addons: { label:"એડ-ઓન", items:[
              { id:"extra_pav", name:"એક્સ્ટ્રા પાવ", price:30 },
              { id:"extra_butter", name:"એક્સ્ટ્રા બટર", price:20 },
              { id:"extra_cheese", name:"એક્સ્ટ્રા ચીઝ", price:25 },
              { id:"chaas", name:"છાસ", price:30 },
              { id:"sweet_lassi", name:"સ્વીટ લસ્સી", price:40 }
            ]}
          }
        }
      }
    };

    function normalizeCuisineToArray(cuisineObj){
      const out = {};
      for(const cKey in cuisineObj){
        const c = cuisineObj[cKey];
        out[cKey.toLowerCase()] = { label: c.label, categories: [] };
        const cats = c.categories || {};
        for(const catKey in cats){
          out[cKey.toLowerCase()].categories.push({
            id: catKey,
            label: cats[catKey].label,
            items: cats[catKey].items || []
          });
        }
      }
      return out;
    }

    let RAW_DATA = normalizeCuisineToArray(JALARAM_MENU.cuisines);

    /* ===============================
       ITEM ICONS (MINIMAL SVG LOGOS)
       =============================== */
    const ICON_SVGS = {
      bowl: `
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path d="M10 22c0 10 6 16 14 16s14-6 14-16H10z"/>
          <path d="M12 22h24"/>
          <path d="M16 38h16"/>

    function getItemIconSVG(item, categoryId){
      const n = (item.name || "").toLowerCase();
      const id = (item.id || "").toLowerCase();
      const cat = (categoryId || "").toLowerCase();

      if(n.includes("પાવ") || n.includes("pav") || id.includes("pav_bhaji")) return ICON_SVGS.bread;
      if(n.includes("પુલાવ") || n.includes("pulav") || n.includes("pulao") || cat.includes("pulav")) return ICON_SVGS.bowl;
      if(n.includes("કોમ્બો") || n.includes("combo") || cat.includes("combo")) return ICON_SVGS.combo;
      if(n.includes("ચીઝ") || n.includes("cheese") || id.includes("cheese")) return ICON_SVGS.cheese;
      if(n.includes("લસ્સી") || n.includes("lassi") || n.includes("છાસ") || n.includes("chaas") || cat.includes("addons")) return ICON_SVGS.drink;

      if(cat.includes("pavbhaji")) return ICON_SVGS.bread;
      if(cat.includes("pulav")) return ICON_SVGS.bowl;
      if(cat.includes("combos")) return ICON_SVGS.combo;
      if(cat.includes("addons")) return ICON_SVGS.cheese;

      return ICON_SVGS.bowl;
    }

    /* ===============================

    function getJalaramCategories(){
      const j = RAW_DATA.jalaram;
      return (j && j.categories) ? j.categories : [];
    }

    function findItemMeta(name){
      for(const c in RAW_DATA){
        for(const cat of RAW_DATA[c].categories){
          for(const item of cat.items){
            if(item.name.toLowerCase() === name.toLowerCase()){
              return { price: item.price || 0 };
            }
          }
        }
      }
      return { price: 0 };
    }

    function incItem(itemName, amount=1){
      const meta = findItemMeta(itemName);
      const current = ENGINE_STATE.items_detected[itemName]?.qty || 0;
      ENGINE_STATE.items_detected[itemName] = {
        qty: Math.max(0, current + amount),
        price: meta.price
      };
      if(ENGINE_STATE.items_detected[itemName].qty <= 0){
        delete ENGINE_STATE.items_detected[itemName];
      }
      updateFinalSlide();
    }
    function decItem(itemName, amount=1){ incItem(itemName, -amount); }

    function calculateCartTotals(){
      const cart = ENGINE_STATE.items_detected || {};
      let total = 0;
      const items = [];
      for(const [name,data] of Object.entries(cart)){
        const qty = data.qty || 0;
        const price = data.price || 0;
        const lineTotal = qty * price;
        total += lineTotal;
        items.push({ name, qty, price, lineTotal });
      }
      items.sort((a,b)=>a.name.localeCompare(b.name));
      return { items, total };
    }

    /* ===============================
       NAV + SWIPE
       =============================== */
    function goToSlide(idx){
      if(idx < 0 || idx >= slideElements.length) return;

      const curr = slideElements[currentIdx];
      curr.classList.remove('active');
      if(idx > currentIdx){ curr.classList.add('prev'); curr.classList.remove('next'); }
      else { curr.classList.add('next'); curr.classList.remove('prev'); }

      currentIdx = idx;
      const next = slideElements[currentIdx];
      next.classList.remove('prev','next');
      next.classList.add('active');

      dragRatio = 0;
      document.getElementById('depth-fill').style.height = '0%';

      if(next.id === "final") updateFinalSlide();
      if(next.id === "prefs") hydratePrefsUI();
    }

    function executeAction(action){
      const currSlide = slideElements[currentIdx];
      const mode = currSlide.dataset.mode;

      switch(action){
        case "NEXT": goToSlide(currentIdx+1); break;
        case "PREV": if(currentIdx>0) goToSlide(currentIdx-1); break;

        case "SELECT":
          if(mode === "options"){
            const view = currSlide.querySelector('.carousel-viewport');
            const val = view.querySelectorAll('.sub-slide')[view._currOpt || 0]?.dataset?.val;
            if(!val){ showToast("આઇટમ નથી"); return; }
            incItem(val, 1);
            showToast(`${UI_GU.added}: ${val}`);
            goToSlide(currentIdx+1);
          } else {
            goToSlide(currentIdx+1);
          }
          break;

        case "SKIP":
          if(mode === "options"){
            showToast("સ્કિપ");
            goToSlide(currentIdx+1);
          }
          break;

        case "BROWSE":
          if(mode === "options"){
            const view = currSlide.querySelector('.carousel-viewport');
            const slides = view.querySelectorAll('.sub-slide');
            if(!slides.length) return;
            let curr = view._currOpt || 0;
            curr = (curr + 1) % slides.length;
            view._currOpt = curr;
            slides.forEach((s,i)=>{
              if(i===curr){ s.classList.remove('opt-hidden'); s.classList.add('opt-active'); }
              else { s.classList.remove('opt-active'); s.classList.add('opt-hidden'); }
            });
          }
          break;
      }
    }

    function attachEvents(){
      let startX=0,startY=0;

      document.querySelectorAll('.carousel-viewport').forEach(view=>{
        view._currOpt = 0;

        view.addEventListener('touchstart', e=>{
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
        }, {passive:true});

        view.addEventListener('touchmove', e=>{
          const dx = e.touches[0].clientX - startX;
          const dy = e.touches[0].clientY - startY;
          const axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';

          if(axis === 'y' && dy > 0){
            e.preventDefault();
            dragRatio = Math.min(dy/MAX_DRAG, 1);
            const fill = document.getElementById('depth-fill');
            fill.style.height = (dragRatio*100)+'%';
            fill.style.backgroundColor = dragRatio > TRIGGER_THRESHOLD ? 'var(--go)' : '#333';
          }
        }, {passive:false});

        view.addEventListener('touchend', e=>{
          const dx = e.changedTouches[0].clientX - startX;
          const dy = e.changedTouches[0].clientY - startY;
          const axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';

          if(axis === 'y'){
            if(dy < -50) executeAction("PREV");
            else if(dy > 50 && dragRatio > TRIGGER_THRESHOLD) executeAction("SELECT");
          } else {
            const mode = view.closest('.main-slide').dataset.mode;
            if(mode === 'options'){
              if(dx < -50) executeAction("SKIP");
              else if(dx > 50) executeAction("BROWSE");
            }
          }

          document.getElementById('depth-fill').style.height = '0%';
          dragRatio = 0;
        });
      });
    }

    /* ===============================
       FINAL SLIDE (+ / - controls)
       =============================== */

      const list = document.getElementById('final-list');

      const { items, total } = calculateCartTotals();

        list.innerHTML = `<div style="text-align:center;color:#777;font-family:var(--mono);padding:18px;">${UI_GU.cartEmpty}</div>`;
        return;
      }

      let html = "";
      items.forEach(i=>{
        html += `
          <div class="item-row">
            <div class="item-name">
              <div class="t">${escapeHtml(i.name)}</div>

            </div>
            <div class="qty-box">

              <div class="qty-num">${i.qty}</div>
              <button class="qty-btn" onclick="incItemUI('${escapeAttr(i.name)}')">+</button>

      html += `

    window.incItemUI = (name) => { incItem(name, 1); showToast(`+1 ${name}`); };
    window.decItemUI = (name) => { decItem(name, 1); showToast(`-1 ${name}`); };

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){
      return String(str).replaceAll("\\","\\\\").replaceAll("'","\\'");
    }

    /* ===============================
       PREFERENCES
       =============================== */
    function hydratePrefsUI(){
      const pref = ENGINE_STATE.preferences;

      document.querySelectorAll('.pill[data-timing]').forEach(p=>{
        p.classList.toggle('active', p.dataset.timing === pref.timing_pref);

      if(ph) ph.value = pref.phone || "";
      if(notes) notes.value = pref.notes || "";

      refreshOpenBanners();

    window.setTiming = (el) => { ENGINE_STATE.preferences.timing_pref = el.dataset.timing; hydratePrefsUI(); };
    window.setOrderType = (el) => { ENGINE_STATE.preferences.order_type = el.dataset.otype; hydratePrefsUI(); };

    window.syncPrefs = () => {
      ENGINE_STATE.preferences.customer_name = (document.getElementById('cust-name')?.value || "").trim();

    /* ===============================
       WHATSAPP + COPY
       =============================== */
    function buildOrderText({forWhatsapp=false}={}){
      const { items, total } = calculateCartTotals();
      const pref = ENGINE_STATE.preferences;
      if(!items.length) return "";

      const line = s => s + "\n";
      let text = "";

      if(forWhatsapp){
        text += line("📋 *JALARAM FOOD COURT (RAJKOT) — નવી ઓર્ડર*");
        text += line("——————————————");
      } else {
        text += line("JALARAM FOOD COURT (RAJKOT) — ORDER");
        text += line("------------------------------");
      }

      items.forEach((i,idx)=>{
        text += line(`${idx+1}. ${i.name} (x${i.qty}) — ₹${i.lineTotal}`);
      });

      text += line("——————————————");
      text += line(`💰 કુલ: ₹${total}`);
      text += line("——————————————");
      text += line("🧾 પસંદગીઓ:");
      text += line(`• સમય: ${String(pref.timing_pref).toUpperCase()}`);
      text += line(`• પ્રકાર: ${pref.order_type === "dinein" ? UI_GU.dineIn : UI_GU.takeAway}`);
      if(pref.customer_name) text += line(`• નામ: ${pref.customer_name}`);
      if(pref.phone) text += line(`• ફોન: ${pref.phone}`);
      if(pref.notes) text += line(`• નોંધ: ${pref.notes}`);
      text += line("——————————————");
      text += line("⏰ સારો સમય: 6PM–10PM");
      text += line("🚫 6PM પહેલા અને 10PM પછી બંધ");
      text += line(`🟢 હાલની સ્થિતિ: ${isOpenNow() ? UI_GU.statusOpen : UI_GU.statusClosed}`);

      return text.trim();
    }

    window.copyOrderText = async () => {
      const text = buildOrderText({forWhatsapp:false});
      if(!text){ showToast(UI_GU.cartEmpty); return; }
      try{
        await navigator.clipboard.writeText(text);
        showToast(UI_GU.copied);
      }catch(e){
        showToast(UI_GU.copyFailed);
      }
    };

    window.sendWhatsappOrder = () => {
      const text = buildOrderText({forWhatsapp:true});
      if(!text){ showToast(UI_GU.cartEmpty); return; }
      const encoded = encodeURIComponent(text);

      // +91 95585 06539 -> digits only for wa.me
      const WHATSAPP_NUMBER = "919558506539";
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`, "_blank");
    };

    window.startOver = () => {
      ENGINE_STATE.items_detected = {};
      ENGINE_STATE.categories_selected = [];
      ENGINE_STATE.preferences = {
        timing_pref:"now",
        order_type:"takeaway",
        customer_name:"",
        phone:"",
        notes:""
      };
      renderLobby();
      showToast("તૈયાર ✅");
    };

    /* ===============================
       AUTO OPEN/CLOSED BANNER REFRESH
       =============================== */
    function refreshOpenBanners(){
      const open = isOpenNow();
      const prefsBanner = document.getElementById('prefs-open-banner');
      const finalBanner = document.getElementById('final-open-banner');
      const lobbyBanner = document.getElementById('lobby-open-banner');

      const cls = open ? "banner open" : "banner closed";
      const txt = open ? UI_GU.openNow : UI_GU.closedNow;
      const full = `${txt} • ${UI_GU.bestTime}`;

      if(lobbyBanner){ lobbyBanner.className = cls; lobbyBanner.textContent = full; }
      if(prefsBanner){ prefsBanner.className = cls; prefsBanner.textContent = full; }
      if(finalBanner){ finalBanner.className = cls; finalBanner.textContent = full; }

      document.querySelectorAll('.pill-status').forEach(el=>{
        el.innerHTML = `
          <span class="dot ${open ? 'open' : 'closed'}"></span>
          <span>${open ? UI_GU.statusOpen : UI_GU.statusClosed}</span>
        `;
      });
    }
    setInterval(refreshOpenBanners, 60 * 1000);

    /* ===============================
       VOICE MODE (AUTO-ENABLED)
       =============================== */
    let rec;
    function normalizeText(t){
      return (t || "").toLowerCase().replace(/\s+/g, " ").trim();
    }

    function bestMatchItemFromText(txt){
      const allItems = [];
      for(const cat of getJalaramCategories()){
        for(const item of (cat.items || [])){
          allItems.push(item.name);
        }
      }
      const low = txt.toLowerCase();
      let best = null;
      for(const name of allItems){
        const nlow = name.toLowerCase();
        if(low.includes(nlow)){
          if(!best || nlow.length > best.toLowerCase().length) best = name;
        }
      }
      return best;
    }

    function initVoice(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){
        showToast(UI_GU.voiceNA);
        return;
      }
      rec = new SR();
      rec.lang = "en-IN";
      rec.continuous = true;
      rec.interimResults = false;

      rec.onresult = e => {
        const raw = e.results[e.results.length - 1][0].transcript;
        const txt = normalizeText(raw);
        showToast(`🎙️ ${raw}`);

        if(txt.includes("next")) return goToSlide(currentIdx+1);
        if(txt.includes("back") || txt.includes("previous")) return (currentIdx>0 ? goToSlide(currentIdx-1) : null);
        if(txt.includes("select") || txt === "add" || txt.includes("add it")) return executeAction("SELECT");
        if(txt.includes("skip")) return executeAction("SKIP");
        if(txt.includes("browse") || txt.includes("show more")) return executeAction("BROWSE");
        if(txt.includes("whatsapp") || txt.includes("send order")) return sendWhatsappOrder();

        if(txt.startsWith("plus ") || txt.startsWith("increase ")){
          const item = bestMatchItemFromText(txt);
          if(item){ incItem(item, 1); speak(`Added one ${item}`); return; }
        }
        if(txt.startsWith("minus ") || txt.startsWith("decrease ")){
          const item = bestMatchItemFromText(txt);
          if(item){ decItem(item, 1); speak(`Removed one ${item}`); return; }
        }
        if(txt.startsWith("add ")){
          const item = bestMatchItemFromText(txt);
          if(item){ incItem(item, 1); speak(`Added ${item}`); return; }
        }

        speak("Command not recognized");
      };

      rec.onerror = () => showToast(UI_GU.voiceTmp);
      rec.onend = () => {
        const mic = document.getElementById('mic-toggle');
        if(mic && mic.classList.contains('listening')){
          setTimeout(()=>{ try{ rec.start(); }catch(e){} }, 250);
        }
      };

      window.toggleListenMode = () => {
        const mic = document.getElementById('mic-toggle');
        if(!rec) return;

        if(mic.classList.contains('listening')){
          mic.classList.remove('listening');
          try { rec.stop(); } catch(e){}
          showToast(UI_GU.micOff);
        } else {
          mic.classList.add('listening');
          try { rec.start(); } catch(e){}
          showToast(UI_GU.micOn);
        }
      };

      // Auto-enable mic (user can toggle)
      const mic = document.getElementById('mic-toggle');
      mic.classList.add('listening');
      try { rec.start(); showToast(UI_GU.micOn + " ✅"); } catch(e){}
    }

    /* ===============================
       BOOT
       =============================== */
    function boot(){
      renderLobby();
      initVoice();
      refreshOpenBanners();
    }
    boot();
  </script>
</body>
</html>
