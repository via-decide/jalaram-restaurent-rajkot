<!--
  CHANGES (v4 — 2026):
  1–18. All v3 changes preserved (trilingual, mic FAB, earcon, haptics, etc.)
  19. NEW: logOrderToSheet() — gathers cart + ENGINE_STATE.preferences into a
      structured payload and calls google.script.run.logOrder(payload).
  20. NEW: typeof google !== 'undefined' guard — app degrades gracefully when
      opened locally (file://) or outside Apps Script; WhatsApp redirect still fires.
  21. NEW: withSuccessHandler / withFailureHandler wired for silent logging.
  22. sendWhatsappOrder() now calls logOrderToSheet() BEFORE opening WhatsApp.
  23. Checkout button (final slide) also triggers logOrderToSheet().
-->
<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>| food.decide |</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Gujarati:wght@100..800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0a;--card:#111;--border:#2a2a2a;--muted:#8a8a8a;--text:#f0f0f0;
      --orange:#ff671f;--go:#00e676;--bad:#ff3333;--amber:#ffb400;
      --mono:'Courier New', monospace;
      --ui:'Anek Gujarati',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    html,body{margin:0;padding:0;height:100%;width:100%;background:var(--bg);color:var(--text);
      font-family:var(--ui);overflow:hidden;touch-action:none;-webkit-user-select:none;
      user-select:none;font-optical-sizing:auto;font-variation-settings:"wdth" 100;}
    #master-container{height:100vh;width:100vw;position:relative;overflow:hidden;}
    .main-slide{height:100vh;width:100vw;position:absolute;top:0;left:0;display:flex;
      flex-direction:column;background:var(--bg);transition:transform .5s cubic-bezier(.2,.8,.2,1);will-change:transform;}
    .main-slide.prev{transform:translateY(-100%);}
    .main-slide.active{transform:translateY(0);z-index:10;}
    .main-slide.next{transform:translateY(100%);z-index:20;}
    .slide-header{padding:18px 18px 14px;border-left:3px solid var(--orange);height:74px;
      flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
    .header-left{display:flex;flex-direction:column;gap:6px;}
    .header-title{font-family:var(--mono);font-size:.78rem;color:var(--orange);letter-spacing:1px;font-weight:800;text-transform:uppercase;line-height:1;}
    .header-sub{font-family:var(--mono);font-size:.68rem;color:#6f6f6f;letter-spacing:.5px;text-transform:uppercase;line-height:1;}
    .pill-status{font-family:var(--mono);font-size:.68rem;font-weight:900;text-transform:uppercase;
      padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:#0f0f0f;color:#dcdcdc;
      white-space:nowrap;display:flex;align-items:center;gap:8px;}
    .dot{width:8px;height:8px;border-radius:50%;}
    .dot.open{background:var(--go);box-shadow:0 0 14px rgba(0,230,118,.35);}
    .dot.closed{background:var(--bad);box-shadow:0 0 14px rgba(255,51,51,.25);}
    .carousel-viewport{position:relative;flex-grow:1;width:100%;height:100%;}
    .sub-slide{position:absolute;inset:0;padding:22px;display:flex;flex-direction:column;justify-content:center;
      opacity:0;pointer-events:none;transform:translateX(18px);transition:transform .3s ease,opacity .3s ease;}
    .sub-slide.opt-active{z-index:30;opacity:1;pointer-events:auto;transform:translateX(0);}
    .sub-slide.opt-hidden{z-index:0;opacity:0;pointer-events:none;}
    .sub-slide.static{z-index:30;opacity:1;pointer-events:auto;transform:none;}
    h1{font-size:1.95rem;margin:0 0 12px;line-height:1.05;letter-spacing:-.5px;color:var(--orange);font-weight:850;}
    .primary-question{font-size:1.08rem;color:#fff;margin-bottom:22px;line-height:1.4;font-weight:750;}
    .price{font-size:.88rem;color:#b8b8b8;margin-left:10px;font-family:var(--mono);background:#1f1f1f;padding:2px 7px;border-radius:7px;border:1px solid #2f2f2f;}
    .role-label{font-family:var(--mono);font-size:.64rem;color:#000;background:var(--go);padding:5px 9px;
      border-radius:8px;width:fit-content;margin-bottom:14px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;}
    .nav-hint{margin-top:26px;padding-top:16px;border-top:1px solid #2b2b2b;font-family:var(--mono);
      font-size:.72rem;color:#777;display:flex;justify-content:space-between;gap:10px;}
    .lobby-container{display:flex;flex-direction:column;gap:14px;padding:18px 18px 24px;height:100%;justify-content:center;}
    .banner{border:1px solid rgba(255,103,31,.5);background:rgba(255,103,31,.08);padding:12px 14px;
      border-radius:14px;font-family:var(--mono);font-weight:900;text-transform:uppercase;font-size:.74rem;letter-spacing:.5px;color:#ffb38a;}
    .banner.closed{border-color:rgba(255,51,51,.6);background:rgba(255,51,51,.10);color:#ff9a9a;}
    .banner.open{border-color:rgba(0,230,118,.55);background:rgba(0,230,118,.08);color:#9affcf;}
    .grid{display:grid;gap:12px;margin-top:2px;}
    .cat-btn{background:linear-gradient(145deg,#141414,#0a0a0a);border:1px solid #2b2b2b;color:#d8d8d8;
      padding:16px;border-radius:16px;transition:transform .06s,border-color .2s,box-shadow .2s,background .2s;
      text-align:left;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .cat-btn:active{transform:translateY(1px);}
    .cat-btn .name{font-weight:900;font-size:1.05rem;text-transform:uppercase;letter-spacing:.2px;}
    .cat-btn .meta{font-family:var(--mono);font-weight:900;font-size:.7rem;color:#8b8b8b;text-transform:uppercase;}
    .cat-btn.selected{border-color:rgba(255,103,31,.9);box-shadow:0 0 18px rgba(255,103,31,.18);background:linear-gradient(145deg,rgba(255,103,31,.22),rgba(0,0,0,.4));}
    .cat-btn.selected .meta{color:#ffd2ba;}
    .btn{background:#1b1b1b;color:#fff;border:1px solid #2c2c2c;padding:14px;border-radius:14px;font-weight:900;
      text-align:center;font-size:1rem;cursor:pointer;width:100%;box-sizing:border-box;transition:transform .06s,opacity .2s;letter-spacing:.2px;}
    .btn:active{transform:translateY(1px);}
    .btn.primary{background:#fff;color:#000;border:none;}
    .btn.whatsapp{background:#25D366;color:#000;border:none;}
    #depth-fill{position:fixed;right:0;top:0;bottom:0;width:4px;background:#333;z-index:900;height:0%;transition:height .05s linear;}
    .toast-msg{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:#161616;color:var(--go);
      padding:10px 16px;border:1px solid rgba(0,230,118,.8);border-radius:999px;font-size:.85rem;opacity:0;
      pointer-events:none;transition:opacity .25s;z-index:3000;white-space:nowrap;font-family:var(--mono);box-shadow:0 8px 30px rgba(0,0,0,.45);}
    .toast-msg.visible{opacity:1;}

    /* ── MIC FAB (Apple-like) ── */
    #mic-fab{position:fixed;bottom:18px;left:18px;z-index:2000;display:flex;flex-direction:column;align-items:center;gap:7px;}
    #mic-label{font-family:var(--mono);font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:.6px;
      color:var(--go);background:rgba(0,20,8,.85);border:1px solid rgba(0,230,118,.35);padding:5px 10px;
      border-radius:999px;white-space:nowrap;opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s;
      pointer-events:none;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
    #mic-label.visible{opacity:1;transform:translateY(0);}
    #mic-fab.mic-processing #mic-label{color:var(--amber);border-color:rgba(255,180,0,.4);background:rgba(15,10,0,.85);}
    #mic-fab.mic-blocked #mic-label{color:var(--bad);border-color:rgba(255,51,51,.4);background:rgba(20,0,0,.85);}
    #mic-btn-wrap{position:relative;width:56px;height:56px;}
    #mic-pulse-ring{position:absolute;inset:-9px;border-radius:50%;border:2px solid rgba(0,230,118,.55);opacity:0;pointer-events:none;transition:opacity .3s;}
    #mic-fab.mic-listening #mic-pulse-ring{opacity:1;animation:pulse-ring 1.6s cubic-bezier(.4,0,.6,1) infinite;}
    @keyframes pulse-ring{0%{transform:scale(1);opacity:.65}70%{transform:scale(1.35);opacity:.15}100%{transform:scale(1.35);opacity:0}}
    #mic-pulse-ring2{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid rgba(0,230,118,.3);opacity:0;pointer-events:none;}
    #mic-fab.mic-listening #mic-pulse-ring2{opacity:1;animation:pulse-ring 1.6s cubic-bezier(.4,0,.6,1) .5s infinite;}
    #mic-toggle{width:56px;height:56px;background:rgba(10,10,10,.9);border-radius:50%;display:flex;align-items:center;
      justify-content:center;flex-direction:column;gap:0;border:1.5px solid #2d2d2d;cursor:pointer;position:relative;
      overflow:hidden;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
      transition:border-color .35s,box-shadow .35s,background .35s;
      box-shadow:0 2px 6px rgba(0,0,0,.6),0 10px 28px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);}
    #mic-toggle:active{transform:scale(.93);}
    #mic-fab.mic-listening #mic-toggle{border-color:rgba(0,230,118,.85);box-shadow:0 0 22px rgba(0,230,118,.28),0 10px 28px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);background:rgba(0,16,8,.92);}
    #mic-fab.mic-processing #mic-toggle{border-color:rgba(255,180,0,.8);box-shadow:0 0 18px rgba(255,180,0,.22),0 10px 24px rgba(0,0,0,.5);background:rgba(12,10,0,.92);animation:processing-pulse 1s ease-in-out infinite;}
    @keyframes processing-pulse{0%,100%{box-shadow:0 0 10px rgba(255,180,0,.15),0 10px 24px rgba(0,0,0,.5)}50%{box-shadow:0 0 26px rgba(255,180,0,.35),0 10px 24px rgba(0,0,0,.5)}}
    #mic-fab.mic-blocked #mic-toggle{border-color:rgba(255,51,51,.8);box-shadow:0 0 16px rgba(255,51,51,.22),0 10px 24px rgba(0,0,0,.5);background:rgba(14,0,0,.92);animation:shake-blocked 0.4s ease;}
    @keyframes shake-blocked{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    #mic-fab.mic-unsupported #mic-toggle{opacity:.38;cursor:not-allowed;}
    #mic-toggle svg{width:22px;height:22px;fill:#6a6a6a;transition:fill .35s,transform .35s;flex-shrink:0;position:relative;z-index:2;}
    #mic-fab.mic-listening #mic-toggle svg{fill:var(--go);transform:translateY(-5px) scale(.88);}
    #mic-fab.mic-processing #mic-toggle svg{fill:var(--amber);}
    #mic-fab.mic-blocked #mic-toggle svg{fill:var(--bad);}
    #mic-waveform{display:flex;align-items:flex-end;gap:2.5px;height:13px;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity .3s;z-index:2;}
    #mic-fab.mic-listening #mic-waveform{opacity:1;}
    #mic-waveform span{display:block;width:3px;border-radius:2px;background:var(--go);transform-origin:bottom;animation:wave-bar .75s ease-in-out infinite alternate;}
    #mic-waveform span:nth-child(1){height:4px;animation-delay:0s;animation-duration:.6s;}
    #mic-waveform span:nth-child(2){height:9px;animation-delay:.12s;animation-duration:.75s;}
    #mic-waveform span:nth-child(3){height:13px;animation-delay:.04s;animation-duration:.55s;}
    #mic-waveform span:nth-child(4){height:9px;animation-delay:.18s;animation-duration:.8s;}
    #mic-waveform span:nth-child(5){height:4px;animation-delay:.08s;animation-duration:.65s;}
    @keyframes wave-bar{from{transform:scaleY(1);opacity:.7}to{transform:scaleY(2.2);opacity:1}}
    #mic-toggle::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 38% 28%,rgba(255,255,255,.08) 0%,transparent 65%);pointer-events:none;z-index:1;}

    /* ── LANGUAGE TOGGLE ── */
    #lang-toggle{position:fixed;bottom:28px;right:18px;z-index:2000;display:flex;gap:4px;
      background:rgba(12,12,12,.88);border:1px solid #282828;border-radius:999px;padding:5px 6px;
      -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
      box-shadow:0 8px 24px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04);}
    .lang-chip{font-family:var(--mono);font-size:.65rem;font-weight:950;color:#666;background:transparent;border:none;
      border-radius:999px;padding:5px 9px;cursor:pointer;transition:color .2s,background .2s,transform .1s;
      text-transform:uppercase;letter-spacing:.5px;-webkit-user-select:none;user-select:none;}
    .lang-chip:active{transform:scale(.9);}
    .lang-chip.active{background:var(--orange);color:#000;}

    /* ── PREFS / CARD ── */
    .card{border:1px solid #2b2b2b;background:linear-gradient(145deg,#111,#0c0c0c);padding:16px;border-radius:16px;margin-top:14px;box-shadow:0 10px 26px rgba(0,0,0,.35);}
    .label{font-family:var(--mono);font-size:.72rem;color:#8a8a8a;text-transform:uppercase;font-weight:900;letter-spacing:.7px;}
    .pill-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
    .pill{border:1px solid #2b2b2b;background:#101010;color:#ddd;padding:10px 12px;border-radius:999px;font-family:var(--mono);font-weight:950;font-size:.74rem;cursor:pointer;}
    .pill.active{border-color:rgba(0,230,118,.9);background:rgba(0,230,118,.95);color:#000;box-shadow:0 0 12px rgba(0,230,118,.18);}
    .field{display:grid;gap:6px;margin-top:12px;}
    .input,textarea{border:1px solid #2b2b2b;background:#0e0e0e;color:#fff;border-radius:14px;padding:12px;font-size:1rem;outline:none;width:100%;box-sizing:border-box;font-family:var(--ui);}
    textarea{min-height:90px;resize:none;}
    .item-icon-wrap{width:64px;height:64px;border-radius:16px;border:1px solid #2b2b2b;
      background:radial-gradient(120% 120% at 30% 20%,rgba(255,103,31,.18),rgba(0,0,0,.35));
      box-shadow:0 10px 28px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
    .item-icon-wrap svg{width:40px;height:40px;stroke:rgba(255,255,255,.92);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.95;}
    .verdict-container{display:flex;flex-direction:column;height:100%;justify-content:center;padding:0 4px;}
    .choice-header{font-family:var(--mono);color:#6d6d6d;font-size:.8rem;margin-bottom:14px;text-transform:uppercase;text-align:center;letter-spacing:1px;font-weight:950;}
    .input-group{border:1px solid #2b2b2b;background:linear-gradient(145deg,#101010,#0a0a0a);padding:14px;border-radius:16px;margin-bottom:14px;min-height:120px;max-height:42vh;overflow-y:auto;box-shadow:0 10px 26px rgba(0,0,0,.35);}
    .item-row{display:grid;grid-template-columns:1fr auto;gap:12px;padding:12px 0;border-bottom:1px dashed #2b2b2b;align-items:center;}
    .item-name{display:flex;flex-direction:column;gap:6px;}
    .item-name .t{font-family:var(--ui);font-weight:800;font-size:.98rem;color:#e6e6e6;}
    .item-name .s{font-family:var(--mono);font-weight:900;font-size:.72rem;color:#8c8c8c;text-transform:uppercase;letter-spacing:.4px;}
    .qty-box{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
    .qty-btn{width:34px;height:34px;border-radius:12px;border:1px solid #2b2b2b;background:#0e0e0e;color:#fff;
      font-weight:950;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);box-shadow:0 8px 20px rgba(0,0,0,.35);}
    .qty-btn:active{transform:translateY(1px);}
    .qty-num{font-family:var(--mono);font-weight:950;font-size:.84rem;color:var(--go);min-width:34px;text-align:center;}
    .total-row{display:flex;justify-content:space-between;padding-top:12px;margin-top:12px;border-top:1px solid #2b2b2b;font-family:var(--mono);font-weight:950;text-transform:uppercase;letter-spacing:.6px;}
    .total-row .k{color:#9a9a9a;} .total-row .v{color:#fff;}
    .hint{text-align:center;color:#666;font-family:var(--mono);font-size:.74rem;margin-top:2px;}
  </style>
</head>
<body>
  <div id="master-container"></div>
  <div id="depth-fill"></div>
  <div id="toast" class="toast-msg"></div>

  <div id="mic-fab" class="mic-idle">
    <div id="mic-label"></div>
    <div id="mic-btn-wrap">
      <div id="mic-pulse-ring"></div>
      <div id="mic-pulse-ring2"></div>
      <div id="mic-toggle" onclick="toggleListenMode()">
        <svg viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <div id="mic-waveform"><span></span><span></span><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <div id="lang-toggle">
    <button class="lang-chip" data-lang="en-IN" onclick="setLang(this)">EN</button>
    <button class="lang-chip" data-lang="hi-IN" onclick="setLang(this)">HI</button>
    <button class="lang-chip active" data-lang="gu-IN" onclick="setLang(this)">GU</button>
  </div>

<script>

    phoneLabel:"फोन",phonePh:"फोन नंबर (वैकल्पिक)",notesLabel:"विशेष नोट",

    cartEmpty:"कार्ट खाली है",copied:"कॉपी हो गया ✅",copyFailed:"कॉपी नहीं हुआ",
    micOn:"🎙 सुन रहा है",micOff:"🎙 बंद",voiceNA:"वॉइस सपोर्ट नहीं",voiceTmp:"वॉइस त्रुटि — पुनः प्रयास",

/* ── Helpers: pick label from item based on currentDisplayLang ── */
function itemName(item){
  return item['name_'+currentDisplayLang] || item.name_en || item.name_gu || item.name || '';
}
function catLabel(cat){
  return cat['label_'+currentDisplayLang] || cat.label_en || cat.label_gu || cat.label || '';
}
function cuisineLabel(cuisine){
  return cuisine['label_'+currentDisplayLang] || cuisine.label_en || cuisine.label_gu || cuisine.label || '';
}

function normalizeCuisineToArray(cuisineObj){
  const out = {};
  for(const cKey in cuisineObj){
    const c = cuisineObj[cKey];
    out[cKey.toLowerCase()] = {
      label_en: c.label_en || '',
      label_hi: c.label_hi || '',
      label_gu: c.label_gu || '',
      get label(){ return cuisineLabel(this); },
      categories: []
    };
    const cats = c.categories || {};
    for(const catKey in cats){
      const cat = cats[catKey];
      out[cKey.toLowerCase()].categories.push({
        id: catKey,
        label_en: cat.label_en || '',
        label_hi: cat.label_hi || '',
        label_gu: cat.label_gu || '',
        get label(){ return catLabel(this); },
        items: (cat.items || []).map(item => ({
          id:      item.id,
          name_en: item.name_en || '',
          name_hi: item.name_hi || '',
          name_gu: item.name_gu || item.name || '',
          get name(){ return itemName(this); },
          price:   item.price || 0,
          link:    item.link  || ''
        }))
      });
    }
  }
  return out;
}

/* ================================================================
   EARCON (WebAudio)
   ================================================================ */
function playEarcon(type){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    if(type==='start'){
      osc.frequency.setValueAtTime(660,now); osc.frequency.exponentialRampToValueAtTime(1050,now+.1);
      gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.001,now+.18);
      osc.start(now); osc.stop(now+.18);
    } else if(type==='stop'){
      osc.frequency.setValueAtTime(880,now); osc.frequency.exponentialRampToValueAtTime(440,now+.12);
      gain.gain.setValueAtTime(.1,now); gain.gain.exponentialRampToValueAtTime(.001,now+.18);
      osc.start(now); osc.stop(now+.18);
    } else if(type==='error'){
      osc.type='sawtooth'; osc.frequency.setValueAtTime(220,now);
      gain.gain.setValueAtTime(.08,now); gain.gain.exponentialRampToValueAtTime(.001,now+.2);
      osc.start(now); osc.stop(now+.2);
    }
  }catch(e){}
}

};

function detectIntent(txt){
  const low = txt.toLowerCase().trim();
  for(const [intent, words] of Object.entries(CMD_SYNONYMS)){
    for(const w of words){ if(low.includes(w.toLowerCase())) return intent; }
  }
  return null;
}

function bestMatchItemFromText(txt){
  const allItems = [];
  for(const cat of getJalaramCategories()){
    for(const item of (cat.items||[])){ allItems.push(item); }
  }
  const low = txt.toLowerCase();
  let best = null;
  for(const item of allItems){
    for(const field of ['name_en','name_hi','name_gu']){
      const nlow = (item[field]||'').toLowerCase();
      if(nlow && low.includes(nlow)){
        if(!best || nlow.length > (best['name_'+currentDisplayLang]||'').toLowerCase().length) best = item;
      }
    }
  }
  return best;
}

function dispatchVoice(raw){
  const txt = (raw||'').toLowerCase().replace(/\s+/g,' ').trim();
  showToast('🎙 ' + raw);

  if(txt.startsWith('plus ')||txt.startsWith('increase ')||txt.startsWith('add ')){
    const item = bestMatchItemFromText(txt);
    if(item){ incItem(item, 1); speak('Added'); return; }
  }
  if(txt.startsWith('minus ')||txt.startsWith('decrease ')||txt.startsWith('remove ')){
    const item = bestMatchItemFromText(txt);
    if(item){ decItem(item, 1); speak('Removed'); return; }
  }
  const intent = detectIntent(txt);
  switch(intent){
    case 'NEXT':     return goToSlide(currentIdx+1);
    case 'PREV':     return currentIdx>0 ? goToSlide(currentIdx-1) : null;
    case 'SELECT':   return executeAction('SELECT');
    case 'SKIP':     return executeAction('SKIP');
    case 'BROWSE':   return executeAction('BROWSE');
    case 'WHATSAPP': return sendWhatsappOrder();
    default:         speak('Not recognized');
  }
}

/* ================================================================
   VOICE ENGINE
   ================================================================ */
function initVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    setMicState('unsupported');
    showToast(t('voiceNA'),'#ff9a9a');
    window.toggleListenMode = ()=>showToast(t('voiceNA'),'#ff9a9a');
    return;
  }

  function createRec(){
    const r = new SR();
    r.lang = currentVoiceLang;
    r.continuous = true; r.interimResults = false;
    r.onstart = ()=>{ recActive=true; noSpeechRetries=0; setMicState('listening'); };
    r.onspeechend = ()=>{ setMicState('processing'); };
    r.onresult = (e)=>{
      const raw = e.results[e.results.length-1][0].transcript;
      setTimeout(()=>{ dispatchVoice(raw); if(recActive) setMicState('listening'); }, 280);
    };
    r.onerror = (e)=>{
      const code = e.error;
      if(code==='not-allowed'||code==='service-not-allowed'){
        permBlocked=true; recActive=false;
        setMicState('blocked'); playEarcon('error'); doVibrate([40,60,40]);
        showToast('🚫 Mic blocked — tap to retry','#ff9a9a');
      } else if(code==='no-speech'){
        noSpeechRetries++;
        if(noSpeechRetries>=MAX_RETRIES){ recActive=false; setMicState('idle'); showToast('No speech detected'); }
      } else if(code==='audio-capture'){
        recActive=false; setMicState('blocked'); playEarcon('error'); doVibrate([30]);
        showToast('🎙 No mic found','#ff9a9a');
      } else if(code==='network'){
        noSpeechRetries++;
        if(noSpeechRetries>=MAX_RETRIES){ recActive=false; setMicState('idle'); showToast('Network error — voice off'); }
      } else { showToast(t('voiceTmp')); }
    };
    r.onend = ()=>{
      if(recActive && !permBlocked){ setTimeout(()=>{ try{ r.lang=currentVoiceLang; r.start(); }catch(e){} },200); }
      else if(!recActive){ setMicState('idle'); }
    };
    return r;
  }

  rec = createRec();

  window.toggleListenMode = ()=>{
    if(document.getElementById('mic-fab').classList.contains('mic-unsupported')) return;
    if(permBlocked){
      navigator.mediaDevices?.getUserMedia({audio:true})
        .then(stream=>{ stream.getTracks().forEach(t=>t.stop()); permBlocked=false; noSpeechRetries=0;
          rec=createRec(); recActive=true; setMicState('listening');
          try{ rec.start(); }catch(e){} playEarcon('start'); doVibrate([20]); showToast(t('micOn')); })
        .catch(()=>{ showToast('Go to Settings → allow mic','#ff9a9a'); doVibrate([40,60,40]); });
      return;
    }
    if(recActive){
      recActive=false; try{ rec.stop(); }catch(e){}
      setMicState('idle'); playEarcon('stop'); doVibrate([15]); showToast(t('micOff'));
    } else {
      noSpeechRetries=0; recActive=true; rec.lang=currentVoiceLang;
      try{ rec.start(); }catch(e){ recActive=false; setMicState('idle'); return; }
      setMicState('listening'); playEarcon('start'); doVibrate([20]); showToast(t('micOn'));
    }
  };

  noSpeechRetries=0; recActive=true;
  try{ rec.start(); setMicState('listening'); showToast(t('micOn')+' ✅'); }
  catch(e){ recActive=false; setMicState('idle'); }
}

/* ================================================================
   MENU HELPERS
   ================================================================ */
function getJalaramCategories(){
  const j = RAW_DATA.jalaram;
  return (j&&j.categories) ? j.categories : [];
}

function findItemById(id){
  for(const cat of getJalaramCategories()){
    for(const item of (cat.items||[])){ if(item.id===id) return item; }
  }
  return null;
}

function incItem(itemObj, amount=1){
  const key = itemObj.id;
  const current = ENGINE_STATE.items_detected[key]?.qty || 0;
  ENGINE_STATE.items_detected[key] = {
    qty:   Math.max(0, current+amount),
    price: itemObj.price||0,
    item:  itemObj
  };
  if(ENGINE_STATE.items_detected[key].qty<=0) delete ENGINE_STATE.items_detected[key];
  updateFinalSlide();
}
function decItem(itemObj, amount=1){ incItem(itemObj, -amount); }

function calculateCartTotals(){
  const cart = ENGINE_STATE.items_detected || {};
  let total=0; const items=[];
  for(const [id,data] of Object.entries(cart)){
    const qty=data.qty||0, price=data.price||0, lineTotal=qty*price;
    total+=lineTotal;
    items.push({ id, name:itemName(data.item), qty, price, lineTotal, item:data.item });
  }
  items.sort((a,b)=>a.name.localeCompare(b.name));
  return { items, total };
}

/* ================================================================
   LOG ORDER TO SHEET  ← NEW in v4
   ================================================================
   Gathers cart + preferences into a clean payload and calls the
   Apps Script server function.  Wrapped in a typeof guard so the
   app degrades gracefully when opened locally (file://) or in any
   non-Apps-Script context — the WhatsApp redirect still fires.
   ================================================================ */
function logOrderToSheet(){
  try {
    // Always sync latest prefs from DOM before reading
    syncPrefs();

    const { items, total } = calculateCartTotals();
    if (!items.length) return; // nothing to log

    const pref = ENGINE_STATE.preferences;

    // Build a clean, serialisable payload (no DOM refs, no getters)
    const payload = {
      session_id    : ENGINE_STATE.session_id,
      customer_name : pref.customer_name  || '',
      phone         : pref.phone          || '',
      order_type    : pref.order_type     || 'takeaway',
      timing_pref   : pref.timing_pref    || 'now',
      notes         : pref.notes          || '',
      language      : currentDisplayLang  || 'gu',
      total         : total,
      // Serialise each cart line — only primitive fields
      items: items.map(i => ({
        id       : i.id,
        name     : i.name,
        qty      : i.qty,
        price    : i.price,
        lineTotal: i.lineTotal
      }))
    };

    // ── Guard: only call google.script.run inside Apps Script ──
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(result => {
          // Silent success — optionally show a brief toast
          showToast(t('logOk'), 'var(--go)');
          console.log('[logOrder] Sheet row added:', result);
        })
        .withFailureHandler(err => {
          // Non-blocking failure — order still goes to WhatsApp
          showToast(t('logFail'), '#ff9a9a');
          console.warn('[logOrder] Sheet logging failed:', err);
        })
        .logOrder(payload);

      showToast(t('logging'));
    } else {
      // Running locally or outside Apps Script — skip silently
      console.info('[logOrder] google.script.run unavailable — skipping sheet log. Payload:', payload);
    }
  } catch (err) {
    // Never let a logging error block the main UX flow
    console.warn('[logOrder] Unexpected error — skipping:', err);
  }
}

            <div class="primary-question">${t('swipeDownToAdd')}</div>

              <span style="flex:2;text-align:center;color:var(--go);font-weight:950;">${t('swipeDownToAdd')}</span>

            ${['now','6pm','7pm','8pm','9pm','10pm'].map(v=>`<div class="pill" data-timing="${v}" onclick="setTiming(this)">${v==='now'?'Now':v.toUpperCase()}</div>`).join('')}

/* ================================================================
   NAV + SWIPE
   ================================================================ */
function goToSlide(idx){
  if(idx<0||idx>=slideElements.length) return;
  const curr=slideElements[currentIdx];
  curr.classList.remove('active');
  if(idx>currentIdx){ curr.classList.add('prev'); curr.classList.remove('next'); }
  else { curr.classList.add('next'); curr.classList.remove('prev'); }
  currentIdx=idx;
  const next=slideElements[currentIdx];
  next.classList.remove('prev','next'); next.classList.add('active');
  dragRatio=0; document.getElementById('depth-fill').style.height='0%';
  if(next.id==='final') updateFinalSlide();
  if(next.id==='prefs') hydratePrefsUI();
}

function executeAction(action){
  const currSlide=slideElements[currentIdx];
  const mode=currSlide.dataset.mode;
  switch(action){
    case 'NEXT': goToSlide(currentIdx+1); break;
    case 'PREV': if(currentIdx>0) goToSlide(currentIdx-1); break;
    case 'SELECT':
      if(mode==='options'){
        const view=currSlide.querySelector('.carousel-viewport');
        const subSlide=view.querySelectorAll('.sub-slide')[view._currOpt||0];
        const itemId=subSlide?.dataset?.itemId;
        if(!itemId){ showToast(t('noItems')); return; }
        const item=findItemById(itemId);
        if(!item){ showToast(t('noItems')); return; }
        incItem(item,1);
        showToast(`${t('added')}: ${itemName(item)}`);
        goToSlide(currentIdx+1);
      } else { goToSlide(currentIdx+1); }
      break;
    case 'SKIP':
      if(mode==='options'){ showToast(t('skip')); goToSlide(currentIdx+1); }
      break;
    case 'BROWSE':
      if(mode==='options'){
        const view=currSlide.querySelector('.carousel-viewport');
        const ss=view.querySelectorAll('.sub-slide');
        if(!ss.length) return;
        let cur=view._currOpt||0; cur=(cur+1)%ss.length; view._currOpt=cur;
        ss.forEach((s,i)=>{
          if(i===cur){ s.classList.remove('opt-hidden'); s.classList.add('opt-active'); }
          else { s.classList.remove('opt-active'); s.classList.add('opt-hidden'); }
        });
      }
      break;
  }
}

function attachEvents(){
  let startX=0,startY=0;
  document.querySelectorAll('.carousel-viewport').forEach(view=>{
    view._currOpt=0;
    view.addEventListener('touchstart',e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; },{passive:true});
    view.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(Math.abs(dy)>Math.abs(dx)&&dy>0){
        e.preventDefault();
        dragRatio=Math.min(dy/MAX_DRAG,1);
        const f=document.getElementById('depth-fill');
        f.style.height=(dragRatio*100)+'%';
        f.style.backgroundColor=dragRatio>TRIGGER_THRESHOLD?'var(--go)':'#333';
      }
    },{passive:false});
    view.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-startX, dy=e.changedTouches[0].clientY-startY;
      if(Math.abs(dy)>Math.abs(dx)){
        if(dy<-50) executeAction('PREV');
        else if(dy>50&&dragRatio>TRIGGER_THRESHOLD) executeAction('SELECT');
      } else {
        const mode=view.closest('.main-slide').dataset.mode;
        if(mode==='options'){ if(dx<-50) executeAction('SKIP'); else if(dx>50) executeAction('BROWSE'); }
      }
      document.getElementById('depth-fill').style.height='0%'; dragRatio=0;
    });
  });
}

/* ================================================================
   FINAL SLIDE
   ================================================================ */
function updateFinalSlide(){
  const list=document.getElementById('final-list');
  if(!list) return;
  const {items,total}=calculateCartTotals();
  if(!items.length){
    list.innerHTML=`<div style="text-align:center;color:#777;font-family:var(--mono);padding:18px;">${t('cartEmpty')}</div>`;
    return;
  }
  let html='';
  items.forEach(i=>{
    html+=`<div class="item-row">
      <div class="item-name">
        <div class="t">${escapeHtml(i.name)}</div>
        <div class="s">₹${i.price} ${t('each')} • ${t('line')} ₹${i.lineTotal}</div>
      </div>
      <div class="qty-box">
        <button class="qty-btn" onclick="decItemUI('${escapeAttr(i.id)}')">-</button>
        <div class="qty-num">${i.qty}</div>
        <button class="qty-btn" onclick="incItemUI('${escapeAttr(i.id)}')">+</button>
      </div>
    </div>`;
  });
  html+=`<div class="total-row"><span class="k">${t('total')}</span><span class="v">₹${total}</span></div>`;
  list.innerHTML=html;
}

window.incItemUI=(id)=>{ const item=findItemById(id); if(item){ incItem(item,1); showToast(`+1 ${itemName(item)}`); } };
window.decItemUI=(id)=>{ const item=findItemById(id); if(item){ decItem(item,1); showToast(`-1 ${itemName(item)}`); } };

function escapeHtml(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;"); }
function escapeAttr(s){ return String(s).replaceAll('\\','\\\\').replaceAll("'","\\'"); }

/* ================================================================
   PREFERENCES
   ================================================================ */
function hydratePrefsUI(){
  const pref=ENGINE_STATE.preferences;
  document.querySelectorAll('.pill[data-timing]').forEach(p=>p.classList.toggle('active',p.dataset.timing===pref.timing_pref));
  document.querySelectorAll('.pill[data-otype]').forEach(p=>p.classList.toggle('active',p.dataset.otype===pref.order_type));
  const n=document.getElementById('cust-name'), ph=document.getElementById('cust-phone'), nt=document.getElementById('cust-notes');
  if(n) n.value=pref.customer_name||'';
  if(ph) ph.value=pref.phone||'';
  if(nt) nt.value=pref.notes||'';
  refreshOpenBanners();
}

window.setTiming=(el)=>{ ENGINE_STATE.preferences.timing_pref=el.dataset.timing; hydratePrefsUI(); };
window.setOrderType=(el)=>{ ENGINE_STATE.preferences.order_type=el.dataset.otype; hydratePrefsUI(); };
window.syncPrefs=()=>{
  ENGINE_STATE.preferences.customer_name=(document.getElementById('cust-name')?.value||'').trim();
  ENGINE_STATE.preferences.phone=(document.getElementById('cust-phone')?.value||'').trim();
  ENGINE_STATE.preferences.notes=(document.getElementById('cust-notes')?.value||'').trim();
};

/* ================================================================
   WHATSAPP + COPY  ← sendWhatsappOrder now calls logOrderToSheet
   ================================================================ */
function buildOrderText({forWhatsapp=false}={}){
  const {items,total}=calculateCartTotals();
  const pref=ENGINE_STATE.preferences;
  if(!items.length) return '';
  const ln=s=>s+'\n';
  let text='';
  if(forWhatsapp){ text+=ln('📋 *JALARAM FOOD COURT (RAJKOT) — Order*'); text+=ln('——————————————'); }
  else { text+=ln('JALARAM FOOD COURT (RAJKOT) — ORDER'); text+=ln('------------------------------'); }
  items.forEach((i,idx)=>{ text+=ln(`${idx+1}. ${i.name} (x${i.qty}) — ₹${i.lineTotal}`); });
  text+=ln('——————————————');
  text+=ln(`💰 ${t('total')}: ₹${total}`);
  text+=ln('——————————————');
  text+=ln(`• ${t('timingLabel')}: ${String(pref.timing_pref).toUpperCase()}`);
  text+=ln(`• ${t('dineTakeLabel')}: ${pref.order_type==='dinein'?t('dineIn'):t('takeAway')}`);
  if(pref.customer_name) text+=ln(`• ${t('nameLabel')}: ${pref.customer_name}`);
  if(pref.phone) text+=ln(`• ${t('phoneLabel')}: ${pref.phone}`);
  if(pref.notes) text+=ln(`• ${t('notesLabel')}: ${pref.notes}`);
  text+=ln('——————————————');
  text+=ln(`🟢 ${isOpenNow()?t('statusOpen'):t('statusClosed')}`);
  return text.trim();
}

window.copyOrderText=async()=>{
  const text=buildOrderText({forWhatsapp:false});
  if(!text){ showToast(t('cartEmpty')); return; }
  try{ await navigator.clipboard.writeText(text); showToast(t('copied')); }
  catch(e){ showToast(t('copyFailed')); }
};

/**
 * sendWhatsappOrder
 * 1. Fires logOrderToSheet() — non-blocking, degrades silently offline
 * 2. Then opens WhatsApp regardless of logging success/failure
 */
window.sendWhatsappOrder=()=>{
  const text=buildOrderText({forWhatsapp:true});
  if(!text){ showToast(t('cartEmpty')); return; }

  // Log to sheet first (fire-and-forget — never blocks WhatsApp)
  logOrderToSheet();

  // Open WhatsApp immediately — no await needed
  window.open(`https://wa.me/919558506539?text=${encodeURIComponent(text)}`,'_blank');
};

window.startOver=()=>{
  ENGINE_STATE.items_detected={};
  ENGINE_STATE.categories_selected=[];
  ENGINE_STATE.session_id='auto-'+Date.now(); // fresh session ID
  ENGINE_STATE.preferences={timing_pref:'now',order_type:'takeaway',customer_name:'',phone:'',notes:''};
  inGameMode=false;
  renderLobby();
  showToast('✅ Ready');
};

/* ================================================================
   BANNER REFRESH
   ================================================================ */
function refreshOpenBanners(){
  const open=isOpenNow();
  const cls=open?'banner open':'banner closed';
  const full=(open?t('openNow'):t('closedNow'))+' • '+t('bestTime');
  ['lobby-open-banner','prefs-open-banner','final-open-banner'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.className=cls; el.textContent=full; }
  });
  document.querySelectorAll('.pill-status').forEach(el=>{
    el.innerHTML=`<span class="dot ${open?'open':'closed'}"></span><span>${open?t('statusOpen'):t('statusClosed')}</span>`;
  });
}
setInterval(refreshOpenBanners, 60*1000);

/* ================================================================

function boot(){
  restoreLang();
  renderLobby();
  initVoice();
  refreshOpenBanners();
}
boot();
