
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard - Decide</title>
<style>
:root {
  --brand-orange: #ff671f;
  --bg: #000;
  --card: #1a1a1a;
  --border: rgba(255,255,255,0.1);
  --text: #fff;
  --text-dim: #999;
  --success: #00e676;
  --error: #ff4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  padding: 20px;
}

.container { max-width: 1200px; margin: 0 auto; }

.header {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--brand-orange);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.stat-label {
  color: var(--text-dim);
  font-size: 0.875rem;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 2rem;
  font-weight: 900;
  color: var(--brand-orange);
}

.orders-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}

.section-title {
  font-size: 1.5rem;
  font-weight: 900;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  text-align: left;
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

th {
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.875rem;
}

.status-badge {
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 700;
}

.status-confirmed {
  background: rgba(0, 230, 118, 0.2);
  color: var(--success);
}

.status-preparing {
  background: rgba(255, 170, 0, 0.2);
  color: #ffaa00;
}

.status-delivered {
  background: rgba(66, 165, 245, 0.2);
  color: #42a5f5;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--brand-orange);
  color: var(--bg);
}

.btn-primary:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}

.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
}

.menu-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.menu-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.menu-item-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  margin-bottom: 8px;
}

.menu-item-name {
  font-weight: 700;
  font-size: 1.125rem;
}

.menu-item-price {
  font-weight: 900;
  color: var(--brand-orange);
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}

.error {
  background: rgba(255,68,68,0.1);
  border: 1px solid var(--error);
  border-radius: 12px;
  padding: 16px;
  color: var(--error);
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">DECIDE SELLER</div>
    <div id="sellerInfo"></div>
  </div>

  <div id="errorMessage"></div>

  <div id="statsSection" class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Today's Orders</div>
      <div class="stat-value" id="todayOrders">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value" id="totalRevenue">₹-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Order Value</div>
      <div class="stat-value" id="avgOrderValue">₹-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Rating</div>
      <div class="stat-value" id="rating">-</div>
    </div>
  </div>

  <div class="orders-section">
    <div class="section-title">Recent Orders</div>
    <div id="ordersTable">
      <div class="loading">Loading orders...</div>
    </div>
  </div>

  <div class="menu-section">
    <div class="section-title">Menu Items</div>
    <div id="menuGrid">
      <div class="loading">Loading menu...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  'use strict';

  const SUPABASE_URL = 'https://uxvekahjitvctylpgmbl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtZnh0ZnVrcHhncW9obWhyb2NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNjI2MzcsImV4cCI6MjA4NjczODYzN30.tVDeFj4k3levWmox4zEHpVPhHnnWTa8AzAFmB-cIk9Q';

  // Initialize Supabase client
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Get seller ID from URL (e.g., ?seller=xxx or subdomain)
  function getSellerId() {
    const params = new URLSearchParams(window.location.search);
    const sellerId = params.get('seller');
    
    // For demo, use a default seller ID if none provided
    return sellerId || 'demo-seller-id';
  }

  const SELLER_ID = getSellerId();

  function $(id) { return document.getElementById(id); }
  
  function money(n) {
    return '₹' + Number(n || 0).toLocaleString('en-IN');
  }

  function showError(msg) {
    $('errorMessage').innerHTML = `<div class="error">⚠️ ${msg}</div>`;
  }

  async function loadSellerInfo() {
    try {
      const { data, error } = await supabase
        .from('sellers')
        .select('*')
        .eq('id', SELLER_ID)
        .single();

      if (error) throw error;

      if (data) {
        $('sellerInfo').innerHTML = `
          <div style="text-align:right">
            <div style="font-weight:700">${data.business_name}</div>
            <div style="font-size:0.875rem;color:var(--text-dim)">${data.city}</div>
          </div>
        `;
      }
    } catch (err) {
      console.error('Error loading seller:', err);
      showError('Failed to load seller information');
    }
  }

  async function loadStats() {
    try {
      // Get stats from the view
      const { data: stats, error: statsError } = await supabase
        .from('seller_dashboard_stats')
        .select('*')
        .eq('seller_id', SELLER_ID)
        .single();

      if (statsError) throw statsError;

      if (stats) {
        $('totalRevenue').textContent = money(stats.total_revenue);
        $('avgOrderValue').textContent = money(stats.avg_order_value);
        $('rating').textContent = Number(stats.rating || 0).toFixed(1) + ' ⭐';
      }

      // Get today's orders
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const { data: todayOrders, error: todayError } = await supabase
        .from('orders')
        .select('id', { count: 'exact' })
        .eq('seller_id', SELLER_ID)
        .gte('created_at', today.toISOString());

      if (!todayError && todayOrders) {
        $('todayOrders').textContent = todayOrders.length;
      }
    } catch (err) {
      console.error('Error loading stats:', err);
      showError('Failed to load statistics');
    }
  }

  async function loadOrders() {
    try {
      const { data: orders, error } = await supabase
        .from('orders')
        .select('*')
        .eq('seller_id', SELLER_ID)
        .order('created_at', { ascending: false })
        .limit(20);

      if (error) throw error;

      if (!orders || orders.length === 0) {
        $('ordersTable').innerHTML = '<div class="loading">No orders yet</div>';
        return;
      }

      const html = `
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Items</th>
              <th>Total</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(order => {
              const items = Array.isArray(order.items) ? order.items : [];
              const itemCount = items.length;
              const statusClass = 'status-' + order.order_status;
              const time = new Date(order.created_at).toLocaleString('en-IN', {
                day: '2-digit',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
              });

              return `
                <tr>
                  <td><strong>${order.id}</strong></td>
                  <td>${itemCount} items</td>
                  <td><strong>${money(order.total)}</strong></td>
                  <td>${order.payment_method}</td>
                  <td><span class="status-badge ${statusClass}">${order.order_status}</span></td>
                  <td style="color:var(--text-dim);font-size:0.875rem">${time}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;

      $('ordersTable').innerHTML = html;
    } catch (err) {
      console.error('Error loading orders:', err);
      $('ordersTable').innerHTML = '<div class="error">Failed to load orders</div>';
    }
  }

  async function loadMenu() {
    try {
      const { data: items, error } = await supabase
        .from('menu_items')
        .select('*')
        .eq('seller_id', SELLER_ID)
        .order('category', { ascending: true });

      if (error) throw error;

      if (!items || items.length === 0) {
        $('menuGrid').innerHTML = '<div class="loading">No menu items yet</div>';
        return;
      }

      const html = items.map(item => `
        <div class="menu-item">
          <div class="menu-item-header">
            <div>
              <div class="menu-item-name">${item.name}</div>
              <div style="font-size:0.875rem;color:var(--text-dim);margin-top:4px">
                ${item.veg ? '🟢 Veg' : '🔴 Non-veg'} • ${item.category}
              </div>
            </div>
            <div style="font-size:2rem">${item.icon}</div>
          </div>
          <div style="color:var(--text-dim);font-size:0.875rem;margin:8px 0">
            ${item.description || ''}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
            <div class="menu-item-price">${money(item.price)}</div>
            <div style="font-size:0.75rem;color:var(--text-dim)">
              ⏱️ ${item.prep_time_mins} mins
            </div>
          </div>
        </div>
      `).join('');

      $('menuGrid').innerHTML = `<div class="menu-grid">${html}</div>`;
    } catch (err) {
      console.error('Error loading menu:', err);
      $('menuGrid').innerHTML = '<div class="error">Failed to load menu</div>';
    }
  }

  // Initialize dashboard
  async function init() {
    await loadSellerInfo();
    await loadStats();
    await loadOrders();
    await loadMenu();

    // Set up real-time updates for orders
    const orderSubscription = supabase
      .channel('orders-channel')
      .on(
        'postgres_changes',
        {
          event: '*',
          schema: 'public',
          table: 'orders',
          filter: `seller_id=eq.${SELLER_ID}`
        },
        (payload) => {
          console.log('Order update:', payload);
          loadOrders();
          loadStats();
        }
      )
      .subscribe();

    // Refresh every 30 seconds
    setInterval(() => {
      loadStats();
      loadOrders();
    }, 30000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
</html>
